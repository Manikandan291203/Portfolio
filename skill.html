<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: rgb(40, 104, 241);
            color: white;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            font-size: 23px;
            background-color: black;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #e74c3c;
        }

        #skills {
            height: 100vh;
            margin-top: 2%;
        }

        #skills h2 {
            margin-bottom: 20px;
            font-size: 60px;
            animation: fadeIn 1.5s;
        }

        .top-row {
            display: flex;
            justify-content: space-around;
            animation: fadeIn 2s;
        }

        .center-box {
            margin: 30px auto;
            width: 40%;
            text-align: center;
            animation: fadeIn 2.5s;
        }

        .skill-box {
            flex: 1;
            margin: 10px;
            padding: 20px;
            text-align: center;
            background-color: black;
            border-radius: 8px;
            box-shadow: black;
        }

        .skill-box-medium {
            max-width: 500px; 
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: center;
                font-size: 18px;
            }

            nav a {
                margin: 10px 0;
            }

            #skills h2 {
                font-size: 40px; 
            }

            .top-row {
                flex-direction: column; 
                align-items: center;
            }

            .skill-box {
                margin: 15px 0;
                width: 90%; 
            }

            .skill-box-medium {
                width: 90%; 
            }
        }

    </style>
</head>
<body>
    <nav>
        <a class="navbar-brand text-white" href="index.html" style="font-size: 30px;">My Portfolio</a>
        <div>
            <a href="about.html">About</a>
            <a href="skill.html">Skills</a>
            <a href="project.html">Projects</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section id="skills">
        <div class="container">
            <h2 class="text-center" style="margin-bottom: 5%;">Skills</h2>
            <div class="top-row">
                <div class="skill-box">
                    <h4 style="font-size: 30px;">Languages</h4>
                    <p style="font-size: 20px;">Python, C++, HTML, CSS, JavaScript</p>
                </div>
                <div class="skill-box">
                    <h4 style="font-size: 30px;">Databases</h4>
                    <p style="font-size: 20px;">MySQL, SQLite</p>
                </div>
            </div>
            <div class="center-box">
                <div class="skill-box skill-box-medium">
                    <h4 style="font-size: 30px;">Frameworks</h4>
                    <p style="font-size: 20px;">Django, Flask, Bootstrap</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
